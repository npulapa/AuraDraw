<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AuraDraw Workspace</title>

    <link rel="stylesheet" href="css/draw.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<!-- ===================== HEADER ===================== -->

<header>

    <div class="logo">

        <i class="fa-solid fa-pen-ruler"></i>

        <span>AuraDraw</span>

    </div>

    <nav>

        <a href="index.html">Home</a>

        <a href="history.html">History</a>

        <a href="videos.html">Videos</a>

    </nav>

</header>

<!-- ===================== TITLE ===================== -->

<section class="page-title">

    <h1>AI Drawing Workspace</h1>

    <p>Draw your diagram or capture it using the webcam.</p>

</section>

<!-- ===================== TOOLBAR ===================== -->

<section class="toolbar">

    <button id="brushBtn">
        <i class="fa-solid fa-paintbrush"></i>
        Brush
    </button>

    <button id="eraserBtn">
        <i class="fa-solid fa-eraser"></i>
        Eraser
    </button>

    <button id="clearBtn">
        <i class="fa-solid fa-trash"></i>
        Clear
    </button>

    <button id="downloadBtn">
        <i class="fa-solid fa-download"></i>
        Download
    </button>

    <label>

        Color

        <input
            type="color"
            id="colorPicker"
            value="#000000">

    </label>

    <label>

        Brush Size

        <input
            type="range"
            id="brushSize"
            min="2"
            max="20"
            value="5">

    </label>

</section>

<!-- ===================== WORKSPACE ===================== -->

<section class="workspace">

    <!-- Webcam -->

    <div class="card">

        <h2>

            Webcam Feed

        </h2>

        <video
            id="webcam"
            autoplay
            playsinline>

        </video>

        <button id="captureBtn">

            <i class="fa-solid fa-camera"></i>

            Capture

        </button>

    </div>

    <!-- Canvas -->

    <div class="card">

        <h2>

            Drawing Canvas

        </h2>

        <canvas
            id="drawingCanvas"
            width="700"
            height="500">

        </canvas>

    </div>

</section>

<!-- ===================== AI RECOGNITION ===================== -->

<section class="recognition">

    <h2>

        Recognized Diagram

    </h2>

    <input
        type="text"
        id="diagramName"
        placeholder="Diagram name will appear here..."
        readonly>

    <button id="recognizeBtn">

        <i class="fa-solid fa-brain"></i>

        Recognize Diagram

    </button>

</section>

<!-- ===================== STATUS ===================== -->

<section class="status">

    <div class="status-box">

        <i class="fa-solid fa-circle-check"></i>

        <span id="statusText">

            Ready to draw...

        </span>

    </div>

</section>

<!-- ===================== FOOTER ===================== -->

<footer>

    <p>

        © 2026 AuraDraw

    </p>

</footer>

<script src="js/draw.js"></script>

</body>
</html>
